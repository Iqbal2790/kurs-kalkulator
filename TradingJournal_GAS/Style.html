<style>
/* style.css - Tema Cerah & Minimalis ala Referensi Baru */

:root {
    --bg-base: #f4f6eb;
    --bg-gradient: 
        radial-gradient(at 80% 0%, hsla(60, 45%, 85%, 1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(140, 30%, 85%, 1) 0px, transparent 50%),
        radial-gradient(at 80% 100%, hsla(45, 50%, 85%, 1) 0px, transparent 50%),
        radial-gradient(at 0% 0%, hsla(85, 40%, 90%, 1) 0px, transparent 50%);
    
    --surface-glass: rgba(255, 255, 255, 0.4);
    --surface-glass-strong: rgba(255, 255, 255, 0.6);
    --border-glass: rgba(255, 255, 255, 0.5);
    
    --text-primary: #1a1a1a;
    --text-secondary: #666666;
    
    --accent-yellow: linear-gradient(90deg, #fceb69 0%, #d8e555 100%);
    --btn-grey: rgba(0, 0, 0, 0.05);
    
    --fs-display: clamp(2.5rem, 6vw, 3.5rem); /* Sedikit dikecilkan karena ruang lebih sempit */
    --fs-body: 1.1rem;
    --fs-small: 0.9rem;
}

[data-theme="dark"] {
    --bg-base: #1b1c19;
    --bg-gradient: 
        radial-gradient(at 80% 0%, hsla(60, 30%, 15%, 1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(140, 20%, 15%, 1) 0px, transparent 50%),
        radial-gradient(at 80% 100%, hsla(45, 30%, 15%, 1) 0px, transparent 50%),
        radial-gradient(at 0% 0%, hsla(85, 20%, 15%, 1) 0px, transparent 50%);
    --surface-glass: rgba(0, 0, 0, 0.4);
    --surface-glass-strong: rgba(0, 0, 0, 0.6);
    --border-glass: rgba(255, 255, 255, 0.1);
    
    --text-primary: #f0f0f0;
    --text-secondary: #aaaaaa;
    
    --accent-yellow: linear-gradient(90deg, #d8cc54 0%, #b8c442 100%);
    --btn-grey: rgba(255, 255, 255, 0.1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-base);
    background-image: var(--bg-gradient);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: background-color 0.3s ease, background-image 0.3s ease, color 0.3s ease;
}

/* Header & Toggle */
.header-controls {
    margin-bottom: 10px;
}

.theme-btn {
    background: transparent;
    border: none;
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    color: var(--text-primary);
    transition: all 0.2s;
}

.theme-btn:hover { opacity: 0.8; }
.theme-btn span { display: flex; align-items: center; }
.theme-btn .icon-moon { opacity: 0.3; }
.theme-btn .icon-sun { opacity: 1; color: #f5a623; }
[data-theme="dark"] .theme-btn .icon-sun { opacity: 0.3; color: var(--text-primary); }
[data-theme="dark"] .theme-btn .icon-moon { opacity: 1; color: #ffffff; }

.nav-links {
    display: flex;
    gap: 10px;
    background: var(--surface-glass);
    padding: 5px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

.nav-link {
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 15px;
    transition: all 0.3s ease;
}

.nav-link.active {
    background: var(--bg-base);
    color: var(--text-primary);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

/* Container Utama */
.app-container {
    display: flex;
    flex-direction: column;
    gap: 30px;
}

@media (min-width: 800px) {
    .app-container {
        flex-direction: row;
        align-items: stretch;
    }
    .calculator-panel, .chart-panel {
        flex: 1;
    }
}

/* Panel & Sections */
.calculator-panel {
    display: flex;
    flex-direction: column;
    padding: 10px;
    min-width: 0;
}

.chart-panel {
    display: flex;
    flex-direction: column;
    padding: 10px;
}

/* Action Tabs (Beli / Jual) */
.action-tab {
    flex: 1;
    padding: 14px;
    background: var(--surface-glass);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s ease;
}
.action-tab:hover {
    background: var(--surface-glass-strong);
}
.action-tab.active {
    background: var(--text-primary);
    color: var(--bg-base);
    border-color: var(--text-primary);
}

/* Form Input */
.amount-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.section-label {
    font-size: var(--fs-small);
    color: var(--text-secondary);
    font-weight: 500;
}

.styled-input {
    width: 100%;
    padding: 14px 15px;
    border-radius: 12px;
    border: 1px solid var(--border-glass);
    background: var(--surface-glass);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
}
.styled-input:focus {
    border-color: var(--text-primary);
}

.input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

input[type="number"], .result-display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: var(--fs-display);
    font-weight: 600;
    color: var(--text-primary);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    text-align: left;
    -moz-appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

.result-display {
    overflow-wrap: break-word;
}

.currency-selector {
    position: relative;
    display: inline-block;
    flex-shrink: 0;
}

.selected-display {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: var(--fs-body);
    font-weight: 600;
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 999px;
    background: transparent;
}
.currency-symbol {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
}

/* Slider */
input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 22px;
    width: 22px;
    border-radius: 50%;
    background: var(--text-primary);
    cursor: pointer;
    margin-top: -9px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    transition: transform 0.2s ease;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 4px;
    cursor: pointer;
    background: var(--border-glass);
    border-radius: 2px;
}
input[type=range]:focus { outline: none; }

/* Utilities */
.text-green { color: #4caf50 !important; }
.text-red { color: #f44336 !important; }

/* Animasi Update */
.fade-update { animation: fadeUpdate 0.5s ease; }
@keyframes fadeUpdate {
    0% { opacity: 0; transform: translateY(5px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Button & Status */
#saveJournalBtn:hover { opacity: 0.8; }
#saveJournalBtn:disabled { cursor: not-allowed; }

/* History Table Styles */
.history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
    text-align: left;
    white-space: nowrap;
}
.history-table th {
    padding: 15px;
    background: var(--surface-glass-strong);
    color: var(--text-secondary);
    font-weight: 600;
    border-bottom: 2px solid var(--border-glass);
}
.history-table td {
    padding: 15px;
    border-bottom: 1px solid var(--border-glass);
    color: var(--text-primary);
}
.history-table tr:hover {
    background: var(--surface-glass);
}
.type-beli { color: #4caf50; font-weight: 700; }
.type-jual { color: #f44336; font-weight: 700; }
</style>
