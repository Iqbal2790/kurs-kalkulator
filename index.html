<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kurs</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Space Grotesk untuk angka agar elegan, Inter untuk teks -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Theme Toggle & Navigation -->
    <div class="header-controls" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; max-width: 1000px; margin: 0 auto; width: 100%;">
        <div class="nav-links">
            <a href="index.html" class="nav-link active">Kurs Kalkulator</a>
            <a href="trading.html" class="nav-link">Trading Kalkulator</a>
        </div>
        <button id="themeToggle" class="theme-btn" aria-label="Ganti Tema">
            <span class="icon-sun">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </span>
            <span class="icon-moon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </span>
        </button>
    </div>

    <div class="app-container">
        
        <!-- Seksi Kiri: Kalkulator -->
        <main class="calculator-panel">
            
            <!-- From Section -->
            <div class="amount-section">
                <div class="section-label">
                    <span class="arrow-icon">↗</span> Enter Amount
                </div>
                <div class="input-row">
                    <input type="number" id="amount" value="100" min="0" step="any">
                    <div class="currency-selector">
                        <div class="selected-display">
                            <span class="currency-symbol" id="fromSymbol">$</span>
                            <span class="currency-code" id="fromCodeDisplay">USD</span>
                            <span class="dropdown-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </span>
                        </div>
                        <!-- Select disembunyikan secara visual, tapi tetap bisa diklik -->
                        <select id="fromCurrency" class="hidden-select"></select>
                    </div>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-section">
                <button id="swapBtn" class="swap-btn" aria-label="Tukar Mata Uang">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16"/>
                    </svg>
                </button>
            </div>

            <!-- To Section -->
            <div class="amount-section">
                <div class="section-label">
                    <span class="arrow-icon">↙</span> You Receive
                </div>
                <div class="input-row">
                    <!-- Gunakan div atau input readonly untuk hasil -->
                    <div id="result" class="result-display">...</div>
                    <div class="currency-selector">
                        <div class="selected-display">
                            <span class="currency-symbol" id="toSymbol">Rp</span>
                            <span class="currency-code" id="toCodeDisplay">IDR</span>
                            <span class="dropdown-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </span>
                        </div>
                        <select id="toCurrency" class="hidden-select"></select>
                    </div>
                </div>
            </div>
            
            <div class="info-footer">
                <p id="exchange-rate-info" class="rate-info">Mengambil data...</p>
                <p class="date-info">Update: <span id="last-update">-</span> (kurs harian ECB)</p>
            </div>
        </main>

        <!-- Seksi Kanan: Chart -->
        <aside class="chart-panel">
            <div class="chart-header">
                <h3>Riwayat 30 Hari</h3>
            </div>
            <div class="chart-container">
                <canvas id="rateChart"></canvas>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
